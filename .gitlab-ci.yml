stages:
  - build
  - deploy

# ============================================================================
# Docker Build
# ============================================================================
docker:build:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      command: ['--tls=false']
  variables:
    DOCKER_TLS_CERTDIR: ''
    DOCKER_HOST: 'tcp://docker:2375'
    DOCKER_BUILDKIT: '1'
  before_script:
    - until docker info; do sleep 1; done
    - echo "$NEXUS_PASSWORD" | docker login -u "$NEXUS_USERNAME" --password-stdin 192.168.150.203:1234
  script:
    - IMAGE_PATH="192.168.150.203:1234/rfi/backend"
    - TAG="production-$CI_COMMIT_SHORT_SHA"

    - echo "Building Backend Docker Image..."
    - docker build -t $IMAGE_PATH:$TAG .
    - docker push $IMAGE_PATH:$TAG
  only:
    - main

# ============================================================================
# Deploy to Production (VM 200)
# ============================================================================
deploy:
  stage: deploy
  image: alpine:latest
  dependencies:
    - docker:build
  variables:
    SSH_HOST: '192.168.150.200'
    IMAGE_NAME: '192.168.150.203:1234/rfi/backend'
  before_script:
    - apk add --no-cache openssh-client docker-cli
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
  script:
    - echo "Deploying Backend to VM..."
    - |
      if [ -z "$DEPLOY_USER" ]; then
        echo "ERROR: DEPLOY_USER is not set! Please add it to CI/CD Variables."
        exit 1
      fi
      
    - ssh $DEPLOY_USER@$SSH_HOST "echo '$NEXUS_PASSWORD' | docker login -u '$NEXUS_USERNAME' --password-stdin 192.168.150.203:1234"
    - ssh $DEPLOY_USER@$SSH_HOST "docker pull $IMAGE_NAME:production-$CI_COMMIT_SHORT_SHA"

    - ssh $DEPLOY_USER@$SSH_HOST "docker stop rfi-backend || true"
    - ssh $DEPLOY_USER@$SSH_HOST "docker rm rfi-backend || true"
    - |
      ssh $DEPLOY_USER@$SSH_HOST "docker run -d \
        --name rfi-backend \
        --restart unless-stopped \
        --add-host=host.docker.internal:host-gateway \
        --publish 0.0.0.0:2250:1254 \
        $IMAGE_NAME:production-$CI_COMMIT_SHORT_SHA"
  only:
    - main
